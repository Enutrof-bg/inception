services:
  db:
    container_name: db
    image: mariadb:10.6
    build:
     context: ./srcs/requirements/mariadb
     dockerfile: Dockerfile
    volumes:
      - ./srcs/requirements/mariadb/tools/setup.sh:/docker-entrypoint-initdb.d/setup.sh
      - db_data:/home/kevwang/data
